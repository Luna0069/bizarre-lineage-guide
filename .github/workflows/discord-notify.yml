name: Discord Notification
  on:
    push:
      branches: [master]
  jobs:
    notify:
      runs-on: ubuntu-latest
      steps:
        - name: Notify Discord
          env:
            WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          run: |
            MSG=$(echo '${{ github.event.head_commit.message }}' | head -1)
            URL="${{ github.event.head_commit.url }}"
            SITE="https://luna0069.github.io/bizarre-lineage-guide/"
            curl -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"📖
  攻略サイトが更新されました！\",\"description\":\"${MSG}\",\"url\":\"${SITE}\",\"color\":5814783,\"fi
  elds\":[{\"name\":\"🔗
  サイトを見る\",\"value\":\"[攻略サイト](${SITE})\",\"inline\":true},{\"name\":\"📝
  変更内容\",\"value\":\"[コミット](${URL})\",\"inline\":true}],\"footer\":{\"text\":\"Bizarre Lineage
   Guide\"},\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}]}" "$WEBHOOK"
