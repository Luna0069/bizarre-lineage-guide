name: Discord Notification

on:
    push:
      branches: [master]

jobs:
    notify:
      runs-on: ubuntu-latest
      steps:
        - name: Notify Discord
          env:
            WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          run: |
            MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
            URL="${{ github.event.head_commit.url }}"
            SITE="https://luna0069.github.io/bizarre-lineage-guide/"
            JSON="{\"content\":\"<@&1482354254269251654>\""
            JSON="$JSON,\"embeds\":[{\"title\":\"Site Updated\""
            JSON="$JSON,\"description\":\"$MSG\""
            JSON="$JSON,\"url\":\"$SITE\""
            JSON="$JSON,\"color\":5814783}]}"
            curl -H "Content-Type: application/json" -d "$JSON" "$WEBHOOK"
